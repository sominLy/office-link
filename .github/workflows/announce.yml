# 커밋 메시지에 [공지] 가 있으면, 그 뒤의 내용을 모든 오피스 소식 탭에 자동 게시 + 멤버 푸시
name: "Announce update to office feeds"

on:
  push:
    branches:
      - main

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: "Post announcement to feeds"
        shell: bash
        env:
          ANNOUNCE_SECRET: ${{ secrets.ANNOUNCE_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$ANNOUNCE_SECRET" ]; then
            echo "ANNOUNCE_SECRET not set - skipping"
            exit 0
          fi
          MARKER=$(printf '%s\n' "$COMMIT_MSG" | grep -m1 -F '[공지]' || true)
          if [ -z "$MARKER" ]; then
            echo "No announcement marker - skipping"
            exit 0
          fi
          MESSAGE=$(printf '%s' "$MARKER" | sed 's/.*\[공지\][[:space:]]*//')
          export MESSAGE
          echo "Posting: $MESSAGE"
          BODY=$(python3 -c 'import json,os;print(json.dumps({"action":"announce","secret":os.environ["ANNOUNCE_SECRET"],"message":os.environ["MESSAGE"]}))')
          curl -s -X POST "https://ykyocsatvnqbuwvybirw.supabase.co/functions/v1/push-notify" \
            -H "Content-Type: application/json" \
            -d "$BODY"
