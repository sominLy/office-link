# 커밋 메시지에 [공지] 가 있으면, 그 뒤의 내용을 모든 오피스 소식 탭에 자동 게시 + 멤버 푸시
# 사용법: 커밋 메시지 아무 줄에 "[공지] 새 기능이 나왔어요! ✨" 처럼 적으면 끝.
name: Announce update to office feeds

on:
  push:
    branches: [main]

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Extract [공지] line and post
        shell: bash
        env:
          ANNOUNCE_SECRET: ${{ secrets.ANNOUNCE_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$ANNOUNCE_SECRET" ]; then
            echo "ANNOUNCE_SECRET not set — skipping"; exit 0
          fi
          LINE=$(printf '%s\n' "$COMMIT_MSG" | grep -m1 '\[공지\]' || true)
          if [ -z "$LINE" ]; then
            echo "No [공지] marker — skipping"; exit 0
          fi
          export MESSAGE=$(printf '%s' "$LINE" | sed 's/.*\[공지\][[:space:]]*//')
          echo "Posting announcement: $MESSAGE"
          python3 -c "
          import json, os, urllib.request
          req = urllib.request.Request(
              'https://ykyocsatvnqbuwvybirw.supabase.co/functions/v1/push-notify',
              data=json.dumps({
                  'action': 'announce',
                  'secret': os.environ['ANNOUNCE_SECRET'],
                  'message': os.environ['MESSAGE'],
              }).encode(),
              headers={'Content-Type': 'application/json'}, method='POST')
          print(urllib.request.urlopen(req).read().decode())
          "
